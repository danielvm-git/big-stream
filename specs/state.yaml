planning_artifacts:
  scope: specs/requirements/SCOPE_LATEST.yaml
  release_plan: specs/release-plan.yaml
  epics: specs/epics/ (e01-e10, 68 stories, all with verify commands)
  glossary: specs/UBIQUITOUS_LANGUAGE.md
